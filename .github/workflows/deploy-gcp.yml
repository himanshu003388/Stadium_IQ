name: Deploy to GCP Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: promptwars4a
  REGION: us-central1
  REPOSITORY: stadium-iq
  SERVICE: stadium-iq
  IMAGE: us-central1-docker.pkg.dev/promptwars4a/stadium-iq/stadium-iq

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image via Cloud Build
        run: |
          gcloud builds submit \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            --project ${{ env.PROJECT_ID }} \
            .

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --platform=managed \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --set-secrets="GEMINI_API_KEY=GEMINI_API_KEY:latest,CSRF_SECRET=CSRF_SECRET:latest,JWT_SECRET=JWT_SECRET:latest,API_AUTH_KEY=API_AUTH_KEY:latest,ADMIN_PASSWORD=ADMIN_PASSWORD:latest,OPERATOR_PASSWORD=OPERATOR_PASSWORD:latest,ALLOWED_ORIGINS=ALLOWED_ORIGINS:latest" \
            --set-env-vars="NODE_ENV=production" \
            --project=${{ env.PROJECT_ID }}

      - name: Show Service URL
        run: |
          echo "Deployed to: $(gcloud run services describe ${{ env.SERVICE }} --region=${{ env.REGION }} --project=${{ env.PROJECT_ID }} --format='value(status.url)')"
